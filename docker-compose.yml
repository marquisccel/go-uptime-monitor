services:
  monitor:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/uptime.db
      - CHECK_INTERVAL=60
      - CHECK_TIMEOUT=10
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    volumes:
      - uptime_data:/data
    restart: unless-stopped

volumes:
  uptime_data:
